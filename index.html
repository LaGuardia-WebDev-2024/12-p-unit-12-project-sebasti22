<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 12 Project</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <h1>Quiz About Me!</h1>
    <hr />
    <!-- Movie Question -->
    <form id="movie-form">
      <label>
        🕰️ What is my favorite decade?
        <select id="decade-answer">
          <option value="decade1">90s</option>
          <option value="decade2">10s</option>
          <option value="decade3">30s</option>
          <option value="decade4">80s</option>
        </select>
      </label>
      <button type="submit">Check decade Answer</button>
    </form>
    <div id="decade-result">
      <p id="decade-text"></p>
    </div>
    <hr />
    <!-- Book Question -->
    <form id="book-form">
      <label>
        🧑‍🎤Who is my favorite singer?
        <select id="singer-answer">
          <option value="singer1">Ed Sheeran</option>
          <option value="singer2">Britney Spears</option>
          <option value="singer3">Gracie Abrams</option>
          <option value="singer4">Lady Gaga</option>
        </select>
      </label>
      <button type="submit">Check singer Answer</button>
    </form>
    <div id="singer-result">
      <p id="singer-text"></p>
    </div>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>
      
      //========================Movie Question jQuery Code
      $("#movie-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#decade-answer");
        var answer = $answer.val();

        if (answer === "decade1") {
          $("#decade-text").text("YESSSS! New York in the 90s is something I wish I could have experienced..");
        } 
        if (answer === "decade2") {
          $("#decade-text").text("2010s was iconic, but not quite!");
        }  
        if (answer === "decade3") {
          $("#decade-text").text("no...scary time idk.");
        }
        if (answer === "decade4") {
          $("#decade-text").text("LOVE the 80s, but there were a ton of problems..");
        }
      });

      //=======================Book Question jQuery Code
      $("#book-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#singer-answer");
        var answer = $answer.val();

        if (answer === "singer4") {
          $("#singer-text").text("YESSSS! you finally got it. She's absolutley an icon and trailbazer for me that inspires me consistently.");
        }
        if (answer === "singer2") {
          $("singer-text").text("love Britney! But not my number 1 of all timeee");
        }  
        if (answer === "singer3") {
          $("singer-text").text("Blocked");
        }
        if (answer === "singer1") {
          $("singer-text").text("Blocked");    
        }
      });
      
    </script>
  </body>
